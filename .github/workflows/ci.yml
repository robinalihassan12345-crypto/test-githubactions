# =============================================================================
# GITHUB ACTIONS WORKFLOW — CI Pipeline
# =============================================================================
#
# Every GitHub repo can have one or more workflows.  A workflow is a YAML file
# placed under .github/workflows/ that tells GitHub WHAT to run and WHEN.
#
# This file runs on every push and pull request to ANY branch.
# It installs dependencies, lints the code, runs tests, and prints "hello".
# =============================================================================

# ── 1. WORKFLOW NAME ──────────────────────────────────────────────────────────
# This name appears in the GitHub UI under the "Actions" tab.
name: CI/CD

# ── 2. TRIGGERS (ON) ──────────────────────────────────────────────────────────
# The `on` keyword defines WHEN the workflow is triggered.
#
# Common events:
#   push        → runs when code is pushed to matching branches
#   pull_request → runs when a PR is opened / updated
#   schedule    → runs on a cron schedule
#   workflow_dispatch → allows you to trigger it manually from the GitHub UI
#   release     → runs when a release is published
on:
  push:
    branches: [main, master]   # only trigger on these branches
  pull_request:
    branches: [main, master]   # also on PRs targeting these branches
  workflow_dispatch:            # lets you click "Run workflow" in the UI

# ── 3. JOBS ───────────────────────────────────────────────────────────────────
# A workflow is made up of one or more JOBS that run in parallel by default.
# Each job runs on a fresh virtual machine (runner).
jobs:
  # ── JOB: test ─────────────────────────────────────────────────────────────
  test:
    # Runner: the OS that the job runs on.
    # ubuntu-latest is the most common choice (free, fast).
    runs-on: ubuntu-latest

    # ── 3a. STRATEGY (optional) ──────────────────────────────────────────────
    # A matrix strategy lets you test across multiple OSes / language versions.
    # GitHub will expand this into 3 separate jobs (one per Python version).
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    # ── 3b. STEPS ────────────────────────────────────────────────────────────
    # Each job runs a sequence of STEPS.  Steps can run shell commands OR use
    # pre-built "actions" from the GitHub Marketplace.
    steps:
      # Step 1 — Checkout the repository code onto the runner.
      # Uses the official `actions/checkout` action (v4).
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 — Set up Python on the runner.
      # Uses the official `actions/setup-python` action.
      # The `with` block passes inputs to the action.
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"          # caches pip dependencies for faster runs

      # Step 3 — Install project dependencies.
      # `run` executes a shell command on the runner.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4 — Lint with ruff (fast Python linter).
      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check .

      # Step 5 — Run tests with pytest.
      - name: Run tests
        run: |
          pytest -v --tb=short

      # Step 6 — Run the HTTP server and verify it responds.
      - name: Smoke test HTTP server
        run: |
          python hello.py &
          SERVER_PID=$!
          sleep 2
          curl -sf http://localhost:8080/ | grep "Hello, OpenCode!"
          kill $SERVER_PID

  # ── JOB: deploy (CD — runs only after tests pass on main) ────────────────
  # This job demonstrates CONTINUOUS DEPLOYMENT:
  #   - `needs: test` → only runs if the test job succeeds
  #   - `if:` → only runs on push to main (not on PRs)
  #   - Builds Docker image, pushes to Docker Hub, deploys to your server
  #
  # REQUIRED SECRETS (set in repo → Settings → Secrets and variables → Actions):
  #   DOCKER_USERNAME    – your Docker Hub username
  #   DOCKER_PASSWORD    – your Docker Hub password or access token
  #   SERVER_HOST        – your server's IP address or hostname
  #   SERVER_USER        – SSH username (usually "root" or "ubuntu")
  #   SERVER_SSH_KEY     – private SSH key (paste the whole file content)
  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── STEP: Log in to Docker Hub ──────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── STEP: Build Docker image ────────────────────────────────────────
      - name: Build Docker image
        run: docker build -t helloworld .

#      # ── STEP: Smoke test ────────────────────────────────────────────────
#      - name: Run container smoke test
#        run: |
#          docker run -d --name smoke-test helloworld
#          sleep 3
#          curl --retry 5 --retry-delay 2 --retry-connrefused -s http://localhost:8080 | python -c "import sys,json; d=json.load(sys.stdin); assert d.get('message')=='Hello, OpenCode!', f'Unexpected: {d}'"
#          docker stop smoke-test
#          docker rm smoke-test

      # ── STEP: Tag and push to Docker Hub ────────────────────────────────
      - name: Tag and push to Docker Hub
        run: |
          IMAGE=$(echo "${{ secrets.DOCKER_USERNAME }}" | xargs)/helloworld
          docker tag helloworld $IMAGE:latest
          docker tag helloworld $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}

      # ── STEP: Deploy to your server via SSH ─────────────────────────────
#      - name: Deploy to server
#        uses: appleboy/ssh-action@v1
#        with:
#          host: ${{ secrets.SERVER_HOST }}#          username: ${{ secrets.SERVER_USER }}
#          key: ${{ secrets.SERVER_SSH_KEY }}
#          script: |
#            IMAGE=${{ secrets.DOCKER_USERNAME }}/helloworld
#            echo "→ Pulling latest image: $IMAGE"
#            docker pull $IMAGE:latest#

#            echo "→ Stopping old container (if running)"
#            docker stop helloworld || true
#            docker rm helloworld || true

#            echo "→ Starting new container"
#            docker run -d \
#              --name helloworld \
#              --restart unless-stopped \
#              -p 8080:8080 \
#              $IMAGE:latest

#            echo "→ Cleaning up old images"
